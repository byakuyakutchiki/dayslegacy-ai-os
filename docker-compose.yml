version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dayslegacy
      POSTGRES_USER: dayslegacy
      POSTGRES_PASSWORD: dayslegacy
    volumes:
      - pg-data:/var/lib/postgresql/data

  app:
    build: .
    env_file: backend/.env
    ports:
      - "8082:8080"
    depends_on:
      - db

volumes:
  pg-data:
