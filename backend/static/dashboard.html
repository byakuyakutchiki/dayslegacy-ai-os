<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Days Legacy — Tableau de bord</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f13; color: #e8e8f0; min-height: 100vh; }

  /* Login */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: linear-gradient(135deg, #0f0f13 0%, #1a1a2e 100%);
  }
  .login-card {
    background: #1c1c28; border: 1px solid #2a2a3e; border-radius: 16px;
    padding: 48px 40px; width: 360px; text-align: center;
  }
  .login-logo { font-size: 32px; font-weight: 700; color: #c9a84c; margin-bottom: 8px; }
  .login-sub { color: #888; font-size: 14px; margin-bottom: 32px; }
  .login-card input {
    width: 100%; padding: 12px 16px; background: #12121c; border: 1px solid #2a2a3e;
    border-radius: 8px; color: #e8e8f0; font-size: 15px; margin-bottom: 16px; outline: none;
  }
  .login-card input:focus { border-color: #c9a84c; }
  .btn-gold {
    width: 100%; padding: 12px; background: #c9a84c; border: none; border-radius: 8px;
    color: #0f0f13; font-weight: 700; font-size: 15px; cursor: pointer;
  }
  .btn-gold:hover { background: #d4b86a; }
  .login-error { color: #e05555; font-size: 13px; margin-top: 12px; }

  /* App */
  #app { display: none; }

  .topbar {
    background: #1c1c28; border-bottom: 1px solid #2a2a3e;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 60px;
  }
  .topbar-logo { font-size: 20px; font-weight: 700; color: #c9a84c; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .btn-logout { background: none; border: 1px solid #2a2a3e; border-radius: 6px; padding: 6px 14px; color: #888; cursor: pointer; font-size: 13px; }
  .btn-logout:hover { color: #e8e8f0; border-color: #888; }

  .main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: #1c1c28; border: 1px solid #2a2a3e; border-radius: 12px;
    padding: 20px 24px;
  }
  .stat-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 32px; font-weight: 700; margin-top: 4px; }
  .stat-total .stat-value { color: #e8e8f0; }
  .stat-hot .stat-value { color: #e05555; }
  .stat-warm .stat-value { color: #c9a84c; }
  .stat-cold .stat-value { color: #5588cc; }

  /* Filters */
  .filters { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1px solid #2a2a3e;
    background: none; color: #888; cursor: pointer; font-size: 13px;
  }
  .filter-btn.active { background: #c9a84c; border-color: #c9a84c; color: #0f0f13; font-weight: 600; }

  /* Table */
  .leads-table { width: 100%; border-collapse: collapse; }
  .leads-table th {
    text-align: left; padding: 10px 16px; font-size: 11px; color: #666;
    text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a3e;
  }
  .leads-table td { padding: 14px 16px; border-bottom: 1px solid #1c1c28; }
  .leads-table tr:hover td { background: #1c1c28; cursor: pointer; }

  .score-badge {
    display: inline-block; width: 36px; height: 36px; border-radius: 50%;
    text-align: center; line-height: 36px; font-weight: 700; font-size: 13px;
  }
  .score-hot { background: rgba(224,85,85,0.15); color: #e05555; }
  .score-warm { background: rgba(201,168,76,0.15); color: #c9a84c; }
  .score-cold { background: rgba(85,136,204,0.15); color: #5588cc; }

  .phone-tag { font-family: monospace; font-size: 13px; color: #888; }
  .patrimoine-tag { font-size: 12px; background: #1c1c28; border: 1px solid #2a2a3e; border-radius: 4px; padding: 2px 8px; }
  .sms-sent { font-size: 11px; color: #4caf82; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1c1c28; border: 1px solid #2a2a3e; border-radius: 16px;
    width: 640px; max-height: 80vh; overflow-y: auto; padding: 32px;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 24px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close { background: none; border: none; color: #888; cursor: pointer; font-size: 20px; }
  .modal-section { margin-bottom: 20px; }
  .modal-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .modal-value { font-size: 15px; }
  .transcript-line { padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
  .transcript-user { background: #12121c; }
  .transcript-assistant { background: rgba(201,168,76,0.08); }
  .transcript-role { font-size: 11px; font-weight: 600; margin-bottom: 3px; }
  .role-user { color: #888; }
  .role-assistant { color: #c9a84c; }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 16px; }
    .modal { width: 95vw; padding: 20px; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Days Legacy</div>
    <div class="login-sub">Tableau de bord — Accès BD</div>
    <input type="password" id="pw-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-gold" onclick="doLogin()">Connexion</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Days Legacy</div>
    <div class="topbar-right">
      <span id="topbar-date" style="color:#666;font-size:13px;"></span>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card stat-total">
        <div class="stat-label">Total prospects</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card stat-hot">
        <div class="stat-label">🔥 Chauds (≥7)</div>
        <div class="stat-value" id="stat-hot">—</div>
      </div>
      <div class="stat-card stat-warm">
        <div class="stat-label">⭐ Tièdes (4-6)</div>
        <div class="stat-value" id="stat-warm">—</div>
      </div>
      <div class="stat-card stat-cold">
        <div class="stat-label">📞 Froids (&lt;4)</div>
        <div class="stat-value" id="stat-cold">—</div>
      </div>
    </div>

    <div class="filters">
      <span style="color:#666;font-size:13px;margin-right:4px;">Filtrer :</span>
      <button class="filter-btn active" onclick="setFilter(null, this)">Tous</button>
      <button class="filter-btn" onclick="setFilter(7, this)">🔥 Chauds</button>
      <button class="filter-btn" onclick="setFilter(4, this)">⭐ Tièdes</button>
    </div>

    <table class="leads-table">
      <thead>
        <tr>
          <th>Score</th>
          <th>Nom</th>
          <th>Téléphone</th>
          <th>Patrimoine</th>
          <th>Objectif</th>
          <th>Date</th>
          <th>SMS</th>
        </tr>
      </thead>
      <tbody id="leads-body">
        <tr><td colspan="7" style="text-align:center;padding:40px;color:#666;">Chargement…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal détail -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
let TOKEN = localStorage.getItem("dl_token") || "";
let currentFilter = null;

async function doLogin() {
  const pw = document.getElementById("pw-input").value;
  const r = await fetch("/api/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({password: pw}),
  });
  if (r.ok) {
    const d = await r.json();
    TOKEN = d.token;
    localStorage.setItem("dl_token", TOKEN);
    showApp();
  } else {
    document.getElementById("login-error").textContent = "Mot de passe incorrect.";
  }
}

function logout() {
  TOKEN = "";
  localStorage.removeItem("dl_token");
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("topbar-date").textContent = new Date().toLocaleDateString("fr-FR", {weekday:"long", day:"numeric", month:"long"});
  loadStats();
  loadLeads();
}

async function apiFetch(url) {
  const r = await fetch(url, {headers: {"Authorization": "Bearer " + TOKEN}});
  if (r.status === 401) { logout(); return null; }
  return r.json();
}

async function loadStats() {
  const d = await apiFetch("/api/leads/stats");
  if (!d) return;
  document.getElementById("stat-total").textContent = d.total;
  document.getElementById("stat-hot").textContent = d.chauds;
  document.getElementById("stat-warm").textContent = d.moyens;
  document.getElementById("stat-cold").textContent = d.froids;
}

async function loadLeads(scoreMin) {
  const url = "/api/leads" + (scoreMin != null ? "?score_min=" + scoreMin : "");
  const leads = await apiFetch(url);
  if (!leads) return;
  renderLeads(leads);
}

function setFilter(score, btn) {
  currentFilter = score;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  loadLeads(score);
}

function renderLeads(leads) {
  const tbody = document.getElementById("leads-body");
  if (!leads.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#666;">Aucun prospect pour l\'instant</td></tr>';
    return;
  }
  tbody.innerHTML = leads.map(l => {
    const sc = l.score || 0;
    const cls = sc >= 7 ? "score-hot" : sc >= 4 ? "score-warm" : "score-cold";
    const nom = [l.prenom, l.nom].filter(Boolean).join(" ") || "Inconnu";
    const date = l.date ? new Date(l.date).toLocaleDateString("fr-FR", {day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit"}) : "—";
    return `<tr onclick="openLead(${l.id})">
      <td><span class="score-badge ${cls}">${sc.toFixed(1)}</span></td>
      <td>${nom}</td>
      <td><span class="phone-tag">${l.phone || "—"}</span></td>
      <td><span class="patrimoine-tag">${l.patrimoine || "N/P"}</span></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#aaa;font-size:13px">${l.objectif || "—"}</td>
      <td style="color:#666;font-size:13px">${date}</td>
      <td>${l.sms === "O" ? '<span class="sms-sent">✓ SMS</span>' : ''}</td>
    </tr>`;
  }).join("");
}

async function openLead(id) {
  const l = await apiFetch("/api/leads/" + id);
  if (!l) return;
  const nom = [l.prenom, l.nom].filter(Boolean).join(" ") || "Inconnu";
  const sc = l.score || 0;
  const cls = sc >= 7 ? "score-hot" : sc >= 4 ? "score-warm" : "score-cold";
  const duree = l.duree ? Math.floor(l.duree / 60) + "m " + (l.duree % 60) + "s" : "—";
  const date = l.date ? new Date(l.date).toLocaleString("fr-FR") : "—";

  const transcriptHtml = (l.transcript || []).map(m => `
    <div class="transcript-line transcript-${m.role}">
      <div class="transcript-role role-${m.role}">${m.role === "assistant" ? "SOPHIA" : "PROSPECT"}</div>
      ${m.content}
    </div>`).join("") || '<p style="color:#666;font-size:13px">Aucun transcript disponible</p>';

  document.getElementById("modal-content").innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">${nom}</div>
        <div style="color:#666;font-size:13px;margin-top:4px">${l.phone || "—"} · ${date} · ${duree}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="score-badge ${cls}" style="width:48px;height:48px;line-height:48px;font-size:16px">${sc.toFixed(1)}</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Patrimoine estimé</div>
      <div class="modal-value">${l.patrimoine || "Non précisé"}</div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Objectif</div>
      <div class="modal-value">${l.objectif || "—"}</div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Résumé</div>
      <div class="modal-value" style="color:#aaa;line-height:1.6">${l.resume || "—"}</div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Transcript de l'appel</div>
      ${transcriptHtml}
    </div>`;
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

// Auto-refresh toutes les 30 secondes
setInterval(() => { if (TOKEN) { loadStats(); loadLeads(currentFilter); } }, 30000);

// Check token au démarrage
if (TOKEN) {
  showApp();
}
</script>
</body>
</html>
